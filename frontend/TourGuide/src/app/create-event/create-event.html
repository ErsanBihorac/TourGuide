<div
  class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 px-6 py-12 text-slate-100"
>
  <form (submit)="submitEvent($event)" class="mx-auto w-full max-w-4xl">
    <div
      class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur"
    >
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Promoter</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white">Create an Event</h1>
          <p class="mt-2 text-sm text-slate-300">
            Set up the title, starting date, description and location so the guide can find your
            event.
          </p>
        </div>
        <a
          class="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-xs uppercase tracking-widest text-slate-200 transition hover:bg-white/20"
          (click)="goToYourEvents()"
        >
          return to your events
        </a>
      </div>

      <div class="mt-8 grid gap-6 md:grid-cols-2">
        <label class="block">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Title</span>
          <input
            [formField]="eventForm.title"
            type="text"
            placeholder="e.g.: Bratwurst festival"
            class="mt-3 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 transition focus:border-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-300/40"
          />
        </label>

        <label class="block">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Starting Date</span>
          <input
            [formField]="eventForm.date"
            type="date"
            class="mt-3 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 transition focus:border-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-300/40"
          />
        </label>

        <label class="block md:col-span-2">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Description</span>
          <textarea
            [formField]="eventForm.description"
            rows="4"
            placeholder="Describe the event"
            class="mt-3 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 transition focus:border-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-300/40"
          ></textarea>
        </label>

        <label class="block md:col-span-2">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Location</span>
          <input
            [formField]="eventForm.location"
            type="text"
            placeholder="e.g.: Munich, Nymphenburgerplatz"
            class="mt-3 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-500 transition focus:border-emerald-300/50 focus:outline-none focus:ring-2 focus:ring-emerald-300/40"
          />
        </label>
      </div>

      <div class="mt-8 flex flex-wrap items-center justify-between gap-4">
        <p class="text-xs text-slate-400">
          Please check your information before creating the event.
        </p>
        <button
          [disabled]="eventForm().invalid() || eventForm().submitting()"
          type="submit"
          class="rounded-2xl bg-emerald-400 px-6 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-emerald-400/30 transition hover:-translate-y-0.5 hover:bg-emerald-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300/70 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-500 disabled:shadow-none disabled:opacity-70 disabled:hover:bg-white/5 disabled:focus-visible:ring-0"
        >
          @if (eventForm().submitting()) {
            submitting ...
          } @else {
            create Event
          }
        </button>
      </div>
    </div>
  </form>
</div>
