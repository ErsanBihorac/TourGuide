<div
  class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 px-6 py-12 text-slate-100"
>
  <div class="mx-auto w-full max-w-3xl">
    <div
      class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur"
    >
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Event</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white">Event Details</h1>
          <p class="mt-2 text-sm text-slate-300">
            Hier siehst du die ausführlichen Informationen zum Event.
          </p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
          <button
            type="button"
            class="rounded-full border border-emerald-300/30 bg-emerald-300/10 px-4 py-2 text-xs uppercase tracking-widest text-emerald-200 transition hover:bg-emerald-300/20"
            (click)="toggleEdit()"
          >
            Edit
          </button>

          <button
            (click)="cancleEvent()"
            type="button"
            class="rounded-full border border-rose-400/40 bg-rose-500/10 px-4 py-2 text-xs uppercase tracking-widest text-rose-200 transition hover:bg-rose-500/20"
          >
            Cancel event
          </button>
          <a
            class="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-xs uppercase tracking-widest text-slate-200 transition hover:bg-white/20"
            (click)="goToYourEvents()"
          >
            Return to your events
          </a>
        </div>
      </div>

      <div class="mt-8 grid gap-4 md:grid-cols-2">
        <label class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Titel</span>
          <input
            type="text"
            [value]="title()"
            (input)="title.set($any($event.target).value)"
            [disabled]="!isEditing()"
            class="mt-3 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-white transition focus:border-emerald-300/60 focus:outline-none focus:ring-2 focus:ring-emerald-300/40 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-400"
          />
        </label>
        <label class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Datum</span>
          <input
            type="date"
            [value]="date()"
            (input)="date.set($any($event.target).value)"
            [disabled]="true"
            class="mt-3 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-white transition focus:border-emerald-300/60 focus:outline-none focus:ring-2 focus:ring-emerald-300/40 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-400"
          />
        </label>
        <label class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Ort</span>
          <input
            type="text"
            [value]="location()"
            (input)="location.set($any($event.target).value)"
            [disabled]="true"
            class="mt-3 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-white transition focus:border-emerald-300/60 focus:outline-none focus:ring-2 focus:ring-emerald-300/40 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-400"
          />
        </label>
        <label class="rounded-2xl border border-white/10 bg-white/5 p-5">
          <span class="text-xs uppercase tracking-[0.3em] text-slate-400">Status</span>
          <input
            type="text"
            [value]="status()"
            (input)="status.set($any($event.target).value)"
            [disabled]="true"
            class="mt-3 w-full rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-sm text-white transition focus:border-emerald-300/60 focus:outline-none focus:ring-2 focus:ring-emerald-300/40 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-400"
          />
        </label>
      </div>

      <div class="mt-8 rounded-2xl border border-white/10 bg-white/5 p-6">
        <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Beschreibung</p>
        <textarea
          rows="4"
          [value]="description()"
          (input)="description.set($any($event.target).value)"
          [disabled]="!isEditing()"
          class="mt-3 w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white transition focus:border-emerald-300/60 focus:outline-none focus:ring-2 focus:ring-emerald-300/40 disabled:cursor-not-allowed disabled:border-white/5 disabled:bg-white/5 disabled:text-slate-400"
        ></textarea>
        @if (eventId()) {
          <p class="mt-4 text-xs text-slate-400">
            Event-ID: <span class="font-semibold text-white">{{ eventId() }}</span>
          </p>
        }
      </div>

      @if (isEditing()) {
        <div class="mt-6 flex justify-end">
          <button
            type="button"
            class="rounded-2xl bg-emerald-400 px-6 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-emerald-400/30 transition hover:-translate-y-0.5 hover:bg-emerald-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-300/70"
            (click)="saveEdit()"
          >
            Save edit
          </button>
        </div>
      }
    </div>
  </div>
</div>
