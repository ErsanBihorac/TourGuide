<div
  class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 px-6 py-12 text-slate-100"
>
  <div class="mx-auto w-full max-w-4xl">
    <div
      class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/40 backdrop-blur"
    >
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-slate-400">Promoter</p>
          <h1 class="mt-3 text-3xl font-semibold tracking-tight text-white">Your Events</h1>
          <p class="mt-2 text-sm text-slate-300">Manage your Events and view Details.</p>
        </div>
        <button
          (click)="goToCreateEvent()"
          type="button"
          class="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-xs uppercase tracking-widest text-slate-200 transition hover:bg-white/20"
        >
          create Event
        </button>
        <button
          (click)="signout()"
          type="button"
          class="rounded-full border border-white/10 bg-white/10 px-4 py-2 text-xs uppercase tracking-widest text-slate-200 transition hover:bg-white/20"
        >
          sign out
        </button>
      </div>

      <div class="mt-8 grid gap-4">
        @for (event of this.events(); track $index) {
          <a
            [routerLink]="['/promoter-events', event.id]"
            class="group rounded-2xl border border-white/10 bg-white/5 p-5 transition duration-200 hover:-translate-y-0.5 hover:border-emerald-300/50 hover:bg-white/10"
          >
            <div class="flex flex-wrap items-center justify-between gap-3">
              <div>
                <h2 class="text-lg font-semibold text-white">{{ event.title }}</h2>
                <p class="mt-1 text-sm text-slate-300">{{ event.date }} · {{ event.location }}</p>
              </div>
              <span class="text-sm font-semibold text-emerald-300">Details →</span>
            </div>
          </a>
        }
      </div>
    </div>
  </div>
</div>
